# Bulldozer auto-merges labeled PRs after policy-bot passes and keeps their
# branches current with main.
# Docs: https://github.com/palantir/bulldozer

version: 1

merge:
  trigger:
    labels:
      - "merge-when-ready"
  method: squash
  options:
    squash:
      body: pull_request_body
  delete_after_merge: true
  required_statuses:
    - "policy-bot: main"

update:
  trigger:
    labels:
      - "merge-when-ready"
  ignore:
    labels:
      - "renovate"
